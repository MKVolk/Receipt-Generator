<html>
    <head>  
        <meta charset ="UTF-8">
        <meta name = "viewport" content = "width-device-width, initial-scale=1.0" >
        <title>Receipt Manager </title>
        <h1> Login | Signup</h1>
        <link rel = "stylesheet" href = "style.css">
    </head>
<body>
        <div class = "Auth-Container">
            <form id = "authForm">  
        <h1> The Receipt App </h1>
        <p>Select your account type</p>

        <div class="role-toggle">
         <input type ="radio" id="customer" name="role" value="customer" checked>
         <label for = "customer">Customer</label>
        
         <input type ="radio" id= "merchant" role ="name" value ="merchant" checked>
         <label for ="merchant">Merchant</label>
        
        </div>
        <input type = "text" id = "phone" placeholder ="Phone Number" required>
        <input type = "password" id = "text" placeholder = "Password" required>
        
        <div class ="button-group">
        <button type = "button" class="btn-primary" onclick ="handleLogin()"> Login </button>
        <button type = "button" class="btn-secondary" onclick ="handleSignup()">Signup</button>
        </div>
    </form>
    </div>
    <script src = "script.js"></script>
</body>
</html>
