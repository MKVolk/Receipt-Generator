<!DOCTYPE html>
<html lang="en">
    <head>
        <title>A12 Receipt Generator</title>
        <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
        <link rel="stylesheet"  href="css/neo.css">
    </head>
    <body>
    <main>
        <header>
            <h1>Receipt Generator</h1>
            <a href="https://github.com/MKVolk/Receipt-Generator">Go to Repository</a>
        </header>

        <div class="contentFlexWrapStart">
        <div class="entry">
        <h3>Data for this receipt</h3>
        <div class="contentFlex">
            <div class="contentFlexWrapStart" >
                <label for="tax_rate">Tax Rate: </label>
                <input id="tax_rate" type="number"> 
            </div>

            <div class="contentFlexWrapStart">
                <label for="address" >Address: </label>
                <input id="address" type="text"> 
            </div>

            <div class="contentFlexWrapStart">
                <label for="receipt_n">Receipt Number: </label>
                <input id="receipt_n" type="number"> 
            </div>

            <div class="contentFlexWrapStart">
                <label for="date">Date: </label>
                <input id="date" type="date"> 
            </div>

            <div class="contentFlexWrapStart">
                <label for="clerk_name">Clerk Name: </label>
                <input id="clerk_name" name="clerk_name" type="text"> 
            </div>
        </div>
        </div>
            
        <div class="entry">
            <h3>Total Calculations</h3>
            <label for="sub_total">Sub Total: </label>
            <input id="sub_total" type="number"> <br>

            <label for="sales_tax">Sale Tax: </label>
            <input id="sales_tax" type="number"> <br>

            <label for="total">Total: </label>
            <input id="total" type="number"> <br>
        </div>

        <div class="entry">
        <h3>Items</h3>
        <p>Item name |Price |Qty |TotalPrice</p>
            
        <formItems>
        </formItems>

        <button onclick="addItem()">Add item</button><br>
        </div>

        </div>
    </main>
    <footer>
        <button onclick="fillRandom()">Random</button>
        <button onclick="downloadHandler('file','Hello World','srec')">Download Receipt</button>
    </footer>

    <script src="javascript/index.js"></script>
    </body>
</html>
