<!DOCTYPE html>
<html lang="en">
    <head>

        <h1>Receipt Generator</h1>

            <label for="tax_rate">Tax Rate: </label>

            <label for="clerk_name">Clerk Name</label>

            <h3>Items</h3>
            <p>Item name Price Qty TotalPrice</p>
            <input type="text">
            <input type="number">
            <input type="number">
            <input type="number"> <br>

            <label for="sub_total">Sub Total: </label>
            <input id="sub_total" type="number">

            <label for="sales_tax">Sale Tax: </label>
            <input id="sales_tax" type="number">

            <label for="total">Total: </label>
            <input id="total" type="number">
        </form>
        <button onClick="downloadHandler('file','Hello World','srec')">
            Download Text File
        </button>
        <script src="javascript/index.js"></script>
