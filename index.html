<!DOCTYPE html>
<html lang="en">
    <head>
        <title>A12 Receipt Generator</title>
        <link rel="stylesheet"  href="css/neo.css">
    </head>
    <body>
        <h1>Receipt Generator</h1>
        <a href="https://github.com/MKVolk/Receipt-Generator">Go to Repository</a>

            <h3>Data for this receipt</h3>
            <label for="tax_rate">Tax Rate: </label>
            <input id="tax_rate" type="number"> <br>

            <label for="address" >Address</label>
            <input id="address" type="text"> <br>
            
            <label for="receipt_n">Receipt Number</label>
            <input id="receipt_n" type="number"> <br>
            
            <label for="date">Date</label>
            <input id="date" type="date"> <br>

            <label for="clerk_name">Clerk Name</label>
            <input id="clerk_name" name="clerk_name" type="text"> <br>
            
            
            <h3>Items</h3>
            <p>Item name Price Qty TotalPrice</p>
            
            <formItems><!--
                <item id="item-0">
                    <input name="it_name-0" type="text">
                    <input name="it_price-0" type="number">
                    <input name="it_qty-0" type="number">
                    <input name="it_ext-price-0" type="number">
                <item>-->
            </formItems>
            

            <button onclick="addItem()">Add item</button>
            <br>
            
            <div>
            <label for="sub_total">Sub Total: </label>
            <input id="sub_total" type="number"> <br>

            <label for="sales_tax">Sale Tax: </label>
            <input id="sales_tax" type="number"> <br>

            <label for="total">Total: </label>
            <input id="total" type="number"> <br>
            </div>

        <button onclick="fillRandom()">Random</button>
        <button onclick="downloadHandler('file','Hello World','srec')">
            Download Receipt
        </button>
        <script src="javascript/index.js"></script>
    </body>
</html>
